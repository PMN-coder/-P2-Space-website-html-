<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neutral Space – Career Registration</title>

<style>
:root {
    --bg-dark: #05070f;
    --bg-card: #0f1629;
    --accent: #6aa9ff;
    --text-main: #eef4ff;
    --text-muted: #aab4d4;
}

body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: radial-gradient(circle at top, #121a35, var(--bg-dark));
    color: var(--text-main);
}

.container {
    max-width: 800px;
    margin: 50px auto;
    background: var(--bg-card);
    padding: 35px;
    border-radius: 16px;
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

h1 {
    text-align: center;
    color: var(--accent);
    margin-bottom: 10px;
}

p {
    text-align: center;
    color: var(--text-muted);
    margin-bottom: 30px;
}

form {
    display: grid;
    gap: 18px;
}

label {
    font-weight: 600;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 1rem;
}

input[type="radio"],
input[type="checkbox"] {
    width: auto;
}

textarea {
    resize: vertical;
}

.gender-group {
    display: flex;
    gap: 20px;
}

.terms {
    display: flex;
    align-items: center;
    gap: 10px;
}

.buttons {
    display: flex;
    gap: 20px;
    justify-content: center;
}

button {
    padding: 12px 30px;
    border: none;
    border-radius: 25px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
}

.submit-btn {
    background: var(--accent);
    color: #05070f;
}

.reset-btn {
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
}

button:hover {
    opacity: 0.85;
}

footer {
    text-align: center;
    margin-top: 30px;
    color: var(--text-muted);
    font-size: 0.9rem;
}
</style>
</head>

<body>

<div class="container">
    <h1>Neutral Space – Careers</h1>
    <p>Join our mission to explore the universe responsibly</p>

    <form>

        <!-- 1. Full Name -->
        <div>
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" required>
        </div>

        <!-- 2. Email -->
        <div>
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
        </div>

        <!-- 3. Password -->
        <div>
            <label for="password">Password</label>
            <input type="password" id="password" name="password"
                   pattern=".{6,}"
                   title="Password must be at least 6 characters"
                   required>
        </div>

        <div>
            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" name="confirm"
                   pattern=".{6,}"
                   title="Please enter the same password again"
                   required>
        </div>

        <!-- 4. Gender -->
        <div>
            <label>Gender</label>
            <div class="gender-group">
                <label><input type="radio" name="gender" required> Male</label>
                <label><input type="radio" name="gender"> Female</label>
                <label><input type="radio" name="gender"> Other</label>
            </div>
        </div>

        <!-- 5. Date of Birth -->
        <div>
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob" required>
        </div>

        <!-- 6. Phone Number -->
        <div>
            <label for="phone">Phone Number</label>
            <input type="number" id="phone" name="phone" required>
        </div>

        <!-- 7. Address -->
        <div>
            <label for="address">Address</label>
            <textarea id="address" rows="3" required></textarea>
        </div>

        <!-- 8. State -->
        <div>
            <label for="state">State</label>
            <select id="state" required>
                <option value="">Select State</option>
                <option>Tamil Nadu</option>
                <option>Kerala</option>
                <option>Karnataka</option>
                <option>Maharashtra</option>
                <option>Delhi</option>
            </select>
        </div>

        <!-- 9. Country -->
        <div>
            <label for="country">Country</label>
            <select id="country" required>
                <option value="">Select Country</option>
                <option>India</option>
                <option>USA</option>
                <option>UK</option>
                <option>Japan</option>
                <option>Germany</option>
            </select>
        </div>

        <!-- 10. Upload -->
        <div>
            <label for="photo">Upload Profile Picture</label>
            <input type="file" id="photo" accept="image/*" required>
        </div>

        <!-- 11. Terms -->
        <div class="terms">
            <input type="checkbox" id="terms" required>
            <label for="terms">I agree to the Terms & Conditions</label>
        </div>

        <!-- 12. Buttons -->
        <div class="buttons">
            <button type="submit" class="submit-btn">Submit</button>
            <button type="reset" class="reset-btn">Reset</button>
        </div>

    </form>
</div>

<footer>
    © 2026 Neutral Space • Careers Registration
</footer>

</body>
</html>
