<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LVM3-Class Heavy Lift | Neutral Space</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Syne:wght@400;600&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: #03050d;
    font-family: 'Syne', sans-serif;
    color: #eef4ff;
  }

  /* ── CANVAS STARFIELD ── */
  #starfield {
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    z-index: 0; 
    pointer-events: none;
  }

  /* ── UI OVERLAY ── */
  #ui-layer {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 10;
  }
  .back-btn {
    text-decoration: none;
    color: #5aaeff;
    border: 1px solid rgba(90,174,255,0.4);
    padding: 10px 20px;
    border-radius: 8px;
    background: rgba(10,16,38,0.7);
    backdrop-filter: blur(10px);
    font-weight: 600;
    transition: all 0.3s;
    display: inline-block;
    margin-bottom: 20px;
  }
  .back-btn:hover {
    background: rgba(90,174,255,0.15);
    border-color: #5aaeff;
    box-shadow: 0 0 15px rgba(90,174,255,0.3);
  }
  .hud {
    background: rgba(10,16,38,0.7);
    border: 1px solid rgba(90,174,255,0.18);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 12px;
    max-width: 340px;
  }
  h1 { 
    font-family: 'Orbitron', sans-serif; 
    font-size: 1.2rem; 
    margin: 0 0 10px 0; 
    color: #00d4ff; 
  }
  p { 
    margin: 0; 
    font-size: 0.9rem; 
    color: #8a9dc4; 
    line-height: 1.5; 
  }
  .stats { 
    margin-top: 15px; 
    border-top: 1px solid rgba(90,174,255,0.2); 
    padding-top: 15px; 
  }
  .stat-row { 
    display: flex; 
    justify-content: space-between; 
    margin-bottom: 8px; 
    font-family: 'Space Mono', monospace; 
    font-size: 0.8rem; 
  }
  .stat-label { 
    color: #5aaeff; 
    text-transform: uppercase; 
  }

  /* ── 3D MODEL VIEWER ── */
  model-viewer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 5;
    outline: none;
    --poster-color: transparent;
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="ui-layer">
  <a href="index.html" class="back-btn">← Return to Base</a>
  <div class="hud">
    <h1>LVM3-NS Heavy Lift</h1>
    <p>Custom Tinkercad Architecture. Engineered for deep space and heavy payload delivery.</p>
    <div class="stats">
      <div class="stat-row"><span class="stat-label">Status</span> <span style="color: #00ffaa;">PRE-FLIGHT</span></div>
      <div class="stat-row"><span class="stat-label">Thrust</span> <span>10,000 kN</span></div>
      <div class="stat-row"><span class="stat-label">Payload</span> <span>10,000 kg to LEO</span></div>
    </div>
    <p style="margin-top: 10px; font-size: 0.75rem; color: #5aaeff;"><em>Left Click: Rotate | Scroll: Zoom</em></p>
  </div>
</div>

<model-viewer
  src="space-rocket.glb" 
  alt="Tinkercad Rocket Model"
  camera-controls
  auto-rotate
  rotation-per-second="10deg"
  exposure="1.2"
  shadow-intensity="1">
</model-viewer>

<script>
/* ── STARFIELD ANIMATION ── */
(function() {
  const canvas = document.getElementById('starfield');
  const ctx    = canvas.getContext('2d');
  let stars    = [];
  let W, H;
  
  function resize() { 
    W = canvas.width  = window.innerWidth; 
    H = canvas.height = window.innerHeight; 
  }
  
  function createStars(n) {
    stars = [];
    for (let i = 0; i < n; i++) {
      stars.push({ 
        x: Math.random() * W, 
        y: Math.random() * H, 
        r: Math.random() * 1.4 + 0.2, 
        a: Math.random(), 
        da: (Math.random() - 0.5) * 0.006, 
        vx: (Math.random() - 0.5) * 0.04, 
        vy: Math.random() * 0.06 + 0.01 
      });
    }
  }
  
  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (const s of stars) {
      s.a += s.da;
      if (s.a < 0.05) s.da = Math.abs(s.da);
      if (s.a > 1) s.da = -Math.abs(s.da);
      s.x += s.vx; s.y += s.vy;
      if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
      if (s.x < 0 || s.x > W) { s.x = Math.random() * W; }
      
      ctx.beginPath(); 
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); 
      ctx.fillStyle = `rgba(180,210,255,${s.a})`; 
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  
  resize(); 
  createStars(300); 
  draw();
  window.addEventListener('resize', () => { resize(); createStars(300); });
})();
</script>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

</body>
</html>
